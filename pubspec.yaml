name: voice_spell
description: "VoiceSpell - Cast magic spells with your voice to control your phone"
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.4

  # Database
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.1

  # Speech Recognition
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.1

  # IAP
  in_app_purchase: ^3.2.0

  # Device Actions
  torch_light: ^1.0.2
  screen_brightness: ^0.2.2+1
  flutter_local_notifications: ^18.0.1
  volume_controller: ^2.0.7
  url_launcher: ^6.3.1

  # Haptics & Feedback
  vibration: ^2.0.0

  # Export/Import
  share_plus: ^10.1.4
  file_picker: ^8.3.7

  # Timezone (required by flutter_local_notifications zonedSchedule)
  timezone: ^0.10.1

  # Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
